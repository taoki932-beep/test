<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تلفن اینترنتی</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

  <!-- ── SCREEN: MAIN ── -->
  <div class="screen" id="screenMain">
    <div class="top">
      <div class="status-wave" id="statusWave">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <span class="app-name">VOIP</span>
    </div>
    <div class="id-area">
      <div class="id-label">YOUR ID</div>
      <div class="id-value" id="myId">——————</div>
    </div>
    <div class="status-line">
      <div class="call-txt" id="statusTxt">در حال اتصال...</div>
    </div>

    <!-- Mic init button — shown until mic is granted -->
    <div id="micInitWrap" style="text-align:center;margin-bottom:16px">
      <button id="btnMicInit" onclick="initMic()" style="background:#1e3a5f;border:none;border-radius:12px;padding:10px 24px;color:#94a3b8;font-size:13px;font-family:inherit;cursor:pointer">
        🎙️ فعال‌سازی میکروفون
      </button>
    </div>
    <div class="dial-box" id="dialDisplay">_ _ _ _ _ _</div>
    <div class="numpad">
      <button class="num" data-val="1">1<sub></sub></button>
      <button class="num" data-val="2">2<sub>ABC</sub></button>
      <button class="num" data-val="3">3<sub>DEF</sub></button>
      <button class="num" data-val="4">4<sub>GHI</sub></button>
      <button class="num" data-val="5">5<sub>JKL</sub></button>
      <button class="num" data-val="6">6<sub>MNO</sub></button>
      <button class="num" data-val="7">7<sub>PQRS</sub></button>
      <button class="num" data-val="8">8<sub>TUV</sub></button>
      <button class="num" data-val="9">9<sub>WXYZ</sub></button>
      <button class="num sym" data-val="*">✱</button>
      <button class="num" data-val="0">0<sub>+</sub></button>
      <button class="num sym" id="btnDel">⌫</button>
    </div>
    <div class="actions">
      <div class="action-btn btn-blue" id="btnCall">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      </div>
    </div>
  </div>

  <!-- ── SCREEN: INCOMING ── -->
  <div class="screen hidden" id="screenIncoming">
    <div class="top">
      <div class="status-wave on" id="statusWaveInc">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <span class="app-name">VOIP</span>
    </div>
    <div class="inc-info">
      <div class="inc-label">INCOMING CALL</div>
      <div class="inc-id" id="incomingId">——————</div>
      <div class="inc-sub">در حال زنگ زدن...</div>
    </div>
    <div class="big-wave">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <div class="inc-btns">
      <div class="action-btn btn-red" id="btnReject">
        <svg viewBox="0 0 24 24" fill="#fff" style="transform:rotate(135deg)"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      </div>
      <div class="action-btn btn-accept" id="btnAccept">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      </div>
    </div>
  </div>

  <!-- ── SCREEN: IN-CALL ── -->
  <div class="screen hidden" id="screenCall">
    <div class="top">
      <div class="status-wave on" id="statusWaveCall">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <span class="app-name">VOIP</span>
    </div>
    <div class="incall-info">
      <div class="incall-label">IN CALL</div>
      <div class="incall-id" id="callWithId">——————</div>
      <div class="incall-timer" id="callTimer">00:00</div>
    </div>
    <div class="live-wave">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <div class="incall-btns">
      <div class="action-btn btn-mute" id="btnMute">
        <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>
        </svg>
      </div>
      <div class="action-btn btn-red no-pulse" id="btnHangup">
        <svg viewBox="0 0 24 24" fill="#fff" style="transform:rotate(135deg)"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      </div>
      <div class="action-btn btn-mute" id="btnSpeaker">
        <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 010 14.14"/>
          <path d="M15.54 8.46a5 5 0 010 7.07"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Permission denied overlay -->
  <div class="overlay hidden" id="overlayPerm">
    <div class="perm-box">
      <div class="perm-icon">🎙️</div>
      <div class="perm-title">نیاز به میکروفون</div>
      <div class="perm-txt" id="permTxt">لطفاً دسترسی به میکروفون را در مرورگر فعال کنید و صفحه را رفرش کنید.</div>
      <button class="perm-btn" onclick="location.reload()">رفرش</button>
    </div>
  </div>

<div class="toast" id="toast"></div>
<audio id="remoteAudio" autoplay playsinline></audio>
<script src="app.js"></script>
</body>
</html>
